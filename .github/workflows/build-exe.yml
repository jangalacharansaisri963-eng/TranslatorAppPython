name: Build Single Unified Translator Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Removed customtkinter; kept deep-translator
        pip install pyinstaller deep-translator

    - name: Compile Unified App to Standalone EXE
      run: |
        # Updated to target translator.py
        pyinstaller --onefile --collect-all deep_translator translator.py

    - name: Upload Compiled Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Unified-Quantum-Terminal
        path: dist/*.exe
        if-no-files-found: error
        retention-days: 100
        
