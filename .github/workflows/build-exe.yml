name: Build Universal Translator App Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter deep-translator

    - name: Compile Script to Standalone EXE
      run: |
        pyinstaller --noconsole --onefile universal_translator_app.py

    - name: Upload Compiled Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Universal-Translator-Windows-Executable
        path: dist/universal_translator_app.exe
        if-no-files-found: error
        retention-days: 7
        
